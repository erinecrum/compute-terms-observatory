name: Governance audit

# Adversarial review of the governing-document rule: does each document actually
# govern the artifact its entry tracks?
#
# Runs monthly, and on any change to registry.yaml, because a new or re-pointed
# document is exactly when this rule gets broken. Both known violations -- a
# consumer privacy policy on a weights entry, a reseller's terms as a model card
# -- entered on a registry edit and were found much later by accident.
#
# The audit NEVER suppresses or modifies anything. It writes a triage report and
# uploads it as an artifact. Every disposition is the reviewer's, and the job
# succeeds even when documents are contested: making a contested document fail
# the build would create pressure to tune the audit until it stops objecting,
# which would defeat the point of asking it to argue against the registry.

on:
  push:
    branches: [main]
    paths:
      - registry.yaml
      - entry_classes.yaml
  schedule:
    - cron: "0 7 1 * *"   # 07:00 UTC on the 1st
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: governance-audit
  cancel-in-progress: false

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Pull private data corpus
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: erinecrum/compute-terms-observatory-data
          token: ${{ secrets.DATA_REPO_TOKEN }}
          path: _data

      - name: Use the private corpus
        run: |
          if [ -d _data/snapshots ]; then
            rm -rf snapshots && cp -R _data/snapshots snapshots
            mkdir -p data && cp -R _data/data/. data/
          else
            echo "No corpus available; the audit needs captured text." && exit 1
          fi

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run the audit
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/governance_audit.py

      - name: Summarise for review
        if: always()
        run: |
          python - <<'PY' >> "$GITHUB_STEP_SUMMARY"
          import json, pathlib
          p = pathlib.Path("data/governance_audit.json")
          if not p.exists():
              print("No audit report produced."); raise SystemExit
          d = json.loads(p.read_text())
          print(f"## Governance audit\n")
          print(f"{d['scanned']} documents reviewed, **{d['contested']} for triage**.\n")
          print("Contested means anything short of a confident yes. These are "
                "candidates for review, not defects; nothing was changed.\n")
          for f in d["triage"]:
              print(f"### {f['provider']} / {f['doc_type']}")
              print(f"- governs: **{f['governs']}** (confidence {f['confidence']})")
              print(f"- basis: {f['basis']}")
              print(f"- strongest objection: {f['strongest_objection']}\n")
          PY

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: governance-audit
          path: data/governance_audit.json
          retention-days: 180
