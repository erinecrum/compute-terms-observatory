name: Deploy site to GitHub Pages

# Builds the static site and deploys it to GitHub Pages on push and on demand.
# Data lives in the PRIVATE repo compute-terms-observatory-data. If the
# DATA_REPO_TOKEN secret is configured, the latest corpus is pulled from there;
# otherwise the build falls back to the frozen data baseline committed to this
# repo, so the site always deploys.

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Pull private data corpus (if token configured)
        continue-on-error: true
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: erinecrum/compute-terms-observatory-data
          token: ${{ secrets.DATA_REPO_TOKEN }}
          path: _data

      - name: Use private corpus when available, else the committed baseline
        run: |
          if [ -d _data/snapshots ]; then
            rm -rf snapshots
            cp -R _data/snapshots snapshots
            # Merge private structured data over the tree WITHOUT deleting public
            # files (e.g. data/last-checked.json lives only in this public repo).
            mkdir -p data
            cp -R _data/data/. data/
            echo "Built from the private data corpus."
          else
            echo "No private corpus available; built from the committed baseline."
          fi

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Build the site
        run: python main.py site

      - uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5
      - uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
