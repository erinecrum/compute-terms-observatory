name: Weekly observatory run

# Refreshes the data corpus, which lives in the PRIVATE repo
# compute-terms-observatory-data: fetch all sources, snapshot anything changed,
# re-extract only changed providers, rebuild the dataset + site, push the updated
# corpus back to the private repo, and deploy the site to Pages.
#
# Requires two repository secrets:
#   ANTHROPIC_API_KEY - for the extraction layer
#   DATA_REPO_TOKEN   - read/write access to the private data repo

on:
  schedule:
    - cron: "0 6 * * 1"   # Mondays 06:00 UTC
  workflow_dispatch: {}     # allow manual runs

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Pull private data corpus
        uses: actions/checkout@v4
        with:
          repository: erinecrum/compute-terms-observatory-data
          token: ${{ secrets.DATA_REPO_TOKEN }}
          path: _data

      - name: Place corpus into the working tree
        run: |
          rm -rf snapshots data
          cp -R _data/snapshots snapshots
          cp -R _data/data data

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline (fetch -> extract changed -> build -> site)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python main.py run

      - name: Push refreshed corpus to the private data repo
        run: |
          rm -rf _data/snapshots _data/data
          cp -R snapshots _data/snapshots
          cp -R data _data/data
          cd _data
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No corpus or dataset changes this run."
          else
            git commit -m "chore: weekly corpus refresh [skip ci]"
            git push
          fi

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: run
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
