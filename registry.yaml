        url: https://www.microsoft.com/corporate-responsibility/law-enforcement-requests-report
      - doc_type: ai_documentation
        name: Microsoft Responsible AI / Transparency Notes
        status: unverified
        url: https://www.microsoft.com/ai/responsible-ai
        notes: Confirm exact Azure AI Transparency Notes URL during capture.

