# Source registry — the single place document URLs live. Adding a provider or a
# document is an edit here, never a code change.
#
# Every URL below was fetched and verified on 2026-07-15 to resolve to the right
# document type. Where no public document exists, or where the content lives only
# inside another document, the entry records that gap honestly rather than
# guessing a URL. Status values:
#
#   verified             confirmed to resolve to the right document (has url)
#   unverified           url present, not yet confirmed this pass (flagged)
#   not_published        no such public document/commitment exists (no url)
#   within_service_terms content is only a section of the provider's Terms of
#                        Service (no separate URL); extracted from service_terms
#
# Only 'verified' / 'unverified' entries are fetched. The rest document coverage.

providers:
  # ─────────────────────────── Hyperscalers ───────────────────────────
  - provider: aws
    provider_name: Amazon Web Services
    segment: hyperscaler
    documents:
      - doc_type: service_terms
        name: AWS Customer Agreement
        slug: customer_agreement
        status: verified
        url: https://aws.amazon.com/agreement/
        notes: Master contract; verified body, Last Updated June 01 2026. MACC-equivalent (EDP) is negotiated, not published (see commitment_programs.yaml).
      - doc_type: service_terms
        name: AWS Service Terms
        status: verified
        url: https://aws.amazon.com/service-terms/
        notes: Service-specific terms incl. AI/ML sections; verified, Last Updated July 9 2026.
      - doc_type: sla
        name: Amazon Compute Service Level Agreement (EC2/ECS/Fargate)
        status: verified
        url: https://aws.amazon.com/compute/sla/
        notes: Verified; region-level 99.99% and instance-level 99.5% commitments.
      - doc_type: aup
        name: AWS Acceptable Use Policy
        status: verified
        url: https://aws.amazon.com/aup/
        notes: Verified, Last Updated July 1 2021.
      - doc_type: ai_terms
        name: AWS Responsible AI Policy
        status: verified
        url: https://aws.amazon.com/ai/responsible-ai/policy/
        notes: Verified, last updated Jan 13 2025; supplements the AUP and Service Terms.
      # ── Data protection & accountability (Phase B) ──
      - doc_type: dpa
        name: AWS GDPR Center (DPA)
        status: unverified
        url: https://aws.amazon.com/compliance/gdpr-center/
        notes: AWS DPA terms are incorporated into the Service Terms; GDPR Center is the public hub.
      - doc_type: subprocessor_list
        name: AWS Sub-processors
        status: unverified
        url: https://aws.amazon.com/compliance/sub-processors/
      - doc_type: privacy_policy
        name: AWS Privacy Notice
        status: unverified
        url: https://aws.amazon.com/privacy/
      - doc_type: transparency_report
        name: AWS government-request / transparency page
        status: not_published
        notes: No AWS-specific transparency report; Amazon-wide Information Request Report only. Confirm during capture.
      - doc_type: ai_documentation
        name: AWS AI Service Cards
        status: unverified
        url: https://aws.amazon.com/machine-learning/responsible-machine-learning/

  - provider: azure
    provider_name: Microsoft Azure
    segment: hyperscaler
    documents:
      - doc_type: service_terms
        name: Microsoft Customer Agreement (published)
        status: verified
        url: https://www.microsoft.com/licensing/docs/documents/download/Microsoft%20Customer%20Agreement.pdf
        notes: First-party PDF of the MCA body (the /customeragreement page is only a JS selector). MACC is negotiated, not published.
      - doc_type: sla
        name: SLA for Microsoft Online Services (consolidated; incl. Azure compute/GPU)
        status: verified
        url: https://www.microsoft.com/licensing/docs/documents/download/OnlineSvcsConsolidatedSLA(WW)(English)(July_15_2026)(CR).docx
        notes: >-
          Verified: first-party download of the consolidated Online Services SLA
          (DOCX, 372 KB, dated July 15 2026) with the actual uptime figures and
          credit-tier tables. Ingested via the DOCX path. CAVEAT: the URL is
          version-dated and will change when Microsoft revises the SLA, so a future
          run will report a fetch failure that prompts updating this URL.
      - doc_type: aup
        name: Microsoft Acceptable Use Policy (Online Services)
        status: verified
        url: https://www.microsoft.com/en-us/microsoft-365/legal/docid12
        notes: Verified; prohibited-use policy governing Microsoft Online Services incl. Azure.
      - doc_type: ai_terms
        name: Microsoft Product Terms for Online Services
        status: verified
        url: https://www.microsoft.com/licensing/terms/product/ForOnlineServices/all
        notes: Verified; contains generative-AI service terms and data-use language.

