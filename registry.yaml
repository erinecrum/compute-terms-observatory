# Source registry — the single place document URLs live. Adding a provider or a
# document is an edit here, never a code change.
#
# Every URL below was fetched and verified on 2026-07-15 to resolve to the right
# document type. Where no public document exists, or where the content lives only
# inside another document, the entry records that gap honestly rather than
# guessing a URL. Status values:
#
#   verified             confirmed to resolve to the right document (has url)
#   unverified           url present, not yet confirmed this pass (flagged)
#   not_published        no such public document/commitment exists (no url)
#   within_service_terms content is only a section of the provider's Terms of
#                        Service (no separate URL); extracted from service_terms
#
# Only 'verified' / 'unverified' entries are fetched. The rest document coverage.

providers:
  # ─────────────────────────── Hyperscalers ───────────────────────────
  - provider: aws
    provider_name: Amazon Web Services
    documents:
      - doc_type: service_terms
        name: AWS Customer Agreement
        slug: customer_agreement
        status: verified
        url: https://aws.amazon.com/agreement/
        notes: Master contract; verified body, Last Updated June 01 2026. MACC-equivalent (EDP) is negotiated, not published (see commitment_programs.yaml).
      - doc_type: service_terms
        name: AWS Service Terms
        status: verified
        url: https://aws.amazon.com/service-terms/
        notes: Service-specific terms incl. AI/ML sections; verified, Last Updated July 9 2026.
      - doc_type: sla
        name: Amazon Compute Service Level Agreement (EC2/ECS/Fargate)
        status: verified
        url: https://aws.amazon.com/compute/sla/
        notes: Verified; region-level 99.99% and instance-level 99.5% commitments.
      - doc_type: aup
        name: AWS Acceptable Use Policy
        status: verified
        url: https://aws.amazon.com/aup/
        notes: Verified, Last Updated July 1 2021.
      - doc_type: ai_terms
        name: AWS Responsible AI Policy
        status: verified
        url: https://aws.amazon.com/ai/responsible-ai/policy/
        notes: Verified, last updated Jan 13 2025; supplements the AUP and Service Terms.

  - provider: azure
    provider_name: Microsoft Azure
    documents:
      - doc_type: service_terms
        name: Microsoft Customer Agreement (published)
        status: verified
        url: https://www.microsoft.com/licensing/docs/documents/download/Microsoft%20Customer%20Agreement.pdf
        notes: First-party PDF of the MCA body (the /customeragreement page is only a JS selector). MACC is negotiated, not published.
      - doc_type: sla
        name: SLA for Microsoft Online Services (consolidated; incl. Azure compute/GPU)
        status: verified
        url: https://www.microsoft.com/licensing/docs/documents/download/OnlineSvcsConsolidatedSLA(WW)(English)(July_15_2026)(CR).docx
        notes: >-
          Verified: first-party download of the consolidated Online Services SLA
          (DOCX, 372 KB, dated July 15 2026) with the actual uptime figures. TWO
          caveats for fetching (Step 2): (1) it is a DOCX, so ingesting it needs a
          docx text-extraction dependency you have not yet approved; (2) the URL is
          version-dated and will change when Microsoft revises the SLA, so a future
          run will report a fetch failure that prompts updating this URL.
      - doc_type: aup
        name: Microsoft Acceptable Use Policy (Online Services)
        status: verified
        url: https://www.microsoft.com/en-us/microsoft-365/legal/docid12
        notes: Verified; prohibited-use policy governing Microsoft Online Services incl. Azure.
      - doc_type: ai_terms
        name: Microsoft Product Terms for Online Services
        status: verified
        url: https://www.microsoft.com/licensing/terms/product/ForOnlineServices/all
        notes: Verified; contains generative-AI service terms and data-use language.

  - provider: gcp
    provider_name: Google Cloud
    documents:
      - doc_type: service_terms
        name: Google Cloud Platform Terms of Service
        status: verified
        url: https://cloud.google.com/terms
        notes: Verified body text.
      - doc_type: sla
        name: Compute Engine Service Level Agreement
        status: verified
        url: https://cloud.google.com/compute/sla
        notes: Verified via our own fetcher (WebFetch truncated the page).
      - doc_type: aup
        name: Google Cloud Platform Acceptable Use Policy
        status: verified
        url: https://cloud.google.com/terms/aup
        notes: Verified via our own fetcher (WebFetch truncated the page).
      - doc_type: ai_terms
        name: Google Cloud Service Specific Terms (AI/ML data use)
        status: verified
        url: https://cloud.google.com/terms/service-terms
        notes: Verified; contains the AI/ML data-location and no-training commitment sections.

  # ────────────────────────── GPU-focused ──────────────────────────
  - provider: coreweave
    provider_name: CoreWeave
    documents:
      - doc_type: service_terms
        name: CoreWeave Terms of Use
        status: verified
        url: https://docs.coreweave.com/policies/terms-of-service/terms-of-use
        notes: Verified; provided "AS IS, AS AVAILABLE" with no uptime commitment.
      - doc_type: aup
        name: CoreWeave Acceptable Use Policy
        status: verified
        url: https://docs.coreweave.com/policies/terms-of-service/acceptable-use-policy
        notes: Verified.
      - doc_type: sla
        name: CoreWeave compute/GPU SLA
        status: not_published
        notes: >-
          No compute/GPU SLA is published; the Terms of Use expressly disclaim
          uptime. A separate AI Object Storage SLA exists for object storage only,
          which is not a compute SLA and is not recorded here as one.
      - doc_type: ai_terms
        name: CoreWeave AI-specific terms
        status: not_published
        notes: No dedicated AI terms document found; data terms sit in the Terms of Use / DPA.

  - provider: lambda
    provider_name: Lambda
    documents:
      - doc_type: service_terms
        name: Lambda Terms of Service
        status: verified
        url: https://lambda.ai/legal/terms-of-service
        notes: Verified; single page bundling website/cloud terms, platform guidelines, and the AUP.
      - doc_type: sla
        name: Lambda SLA
        status: not_published
        notes: No SLA published; the Terms expressly disclaim any uptime / uninterrupted-service warranty.
      - doc_type: aup
        name: Lambda Acceptable Use Policy
        status: within_service_terms
        notes: AUP is a section (#acceptable-use-policy) of the Terms of Service; no standalone URL.
      - doc_type: ai_terms
        name: Lambda AI-specific terms
        status: not_published
        notes: No dedicated AI terms document; only minimal AI-related language within the Terms.

  - provider: crusoe
    provider_name: Crusoe
    documents:
      - doc_type: service_terms
        name: Crusoe Legal Center (Cloud Platform Terms of Service)
        status: verified
        url: https://legal.crusoe.ai/
        notes: >-
          Verified; a single legal-center page whose Terms of Service, AUP, SLAs,
          and Service Specific Terms are sections/anchors of this one document.
      - doc_type: sla
        name: Crusoe Service Level Agreements
        status: within_service_terms
        notes: SLA is section #service-level-agreements of the legal center; no separate URL.
      - doc_type: aup
        name: Crusoe Acceptable Use Policy
        status: within_service_terms
        notes: AUP is section #aup of the legal center; no separate URL.
      - doc_type: ai_terms
        name: Crusoe AI/service-specific terms
        status: within_service_terms
        notes: Service Specific Terms are a section of the legal center; no separate URL.

  - provider: runpod
    provider_name: Runpod
    documents:
      - doc_type: service_terms
        name: Runpod Terms of Service
        status: verified
        url: https://www.runpod.io/legal/terms-of-service
        notes: Verified body text.
      - doc_type: sla
        name: Runpod SLA
        status: not_published
        notes: No SLA published; Community Cloud terms state Runpod makes no uptime warranties.
      - doc_type: aup
        name: Runpod Acceptable Use restrictions
        status: within_service_terms
        notes: Acceptable-use restrictions sit within the Terms of Service; no standalone AUP.
      - doc_type: ai_terms
        name: Runpod AI-specific terms
        status: not_published
        notes: No dedicated AI terms document; data/content terms within the Terms of Service.

  - provider: vast
    provider_name: Vast.ai
    documents:
      - doc_type: service_terms
        name: Vast.ai Terms of Service
        status: verified
        url: https://vast.ai/terms
        notes: Verified body text; a separate Data Processing Agreement also exists.
      - doc_type: sla
        name: Vast.ai SLA
        status: not_published
        notes: No SLA published; the Terms disclaim guaranteed availability.
      - doc_type: aup
        name: Vast.ai Acceptable Use restrictions
        status: within_service_terms
        notes: Prohibited-activities section sits within the Terms of Service; no standalone AUP.
      - doc_type: ai_terms
        name: Vast.ai AI-specific terms
        status: not_published
        notes: No dedicated AI terms document; data terms within the Terms / DPA.
